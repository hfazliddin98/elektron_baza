# Nginx sozlamasi.
# Joylashtirish:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/elektron-baza
#   sudo ln -s /etc/nginx/sites-available/elektron-baza /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS uchun:  sudo certbot --nginx -d baza.universitet.uz
# (certbot quyidagi 443-blokni o'zi qo'shadi)

server {
    listen 80;
    server_name baza.universitet.uz;   # o'z domeningizni yozing

    client_max_body_size 10M;          # murojaatga biriktiriladigan rasmlar uchun

    access_log /var/log/nginx/elektron-baza-access.log;
    error_log  /var/log/nginx/elektron-baza-error.log;

    location /static/ {
        alias /srv/elektron_baza/staticfiles/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /srv/elektron_baza/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://unix:/run/elektron-baza.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
